name: rokid-apk

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_PROJECT_DIR: android/rokid
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ROKID_KEYSTORE_BASE64: ${{ secrets.ROKID_KEYSTORE_BASE64 }}
      ROKID_KEYSTORE_PASSWORD: ${{ secrets.ROKID_KEYSTORE_PASSWORD }}
      ROKID_KEY_ALIAS: ${{ secrets.ROKID_KEY_ALIAS }}
      ROKID_KEY_PASSWORD: ${{ secrets.ROKID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Check Android environment
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          ls -la /usr/local/lib/android/sdk || true
          find /usr/local/lib/android/sdk -maxdepth 3 -type f \( -name sdkmanager -o -name adb \) 2>/dev/null || true

      - name: Install Android platform packages
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [[ -z "$SDKMANAGER" ]]; then
            SDKMANAGER="$(find "$SDK_ROOT" -type f -name sdkmanager 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -z "$SDKMANAGER" ]]; then
            echo "sdkmanager not found"
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses > /dev/null || true
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" --install "platforms;android-35" "build-tools;35.0.0" "platform-tools" || true

      - name: Write local.properties
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          printf 'sdk.dir=%s\n' "$SDK_ROOT" > "${ANDROID_PROJECT_DIR}/local.properties"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          set +e
          gradle -p "${ANDROID_PROJECT_DIR}" :app:assembleDebug --stacktrace --no-daemon 2>&1 | tee "${RUNNER_TEMP}/gradle-build.log"
          status=${PIPESTATUS[0]}
          set -e
          if [[ "$status" -ne 0 ]]; then
            summary="$(grep -E "(^FAILURE:|^\\* What went wrong:|^> |requires|Failed|Exception|error:|Caused by|SDK location|compileSdk)" "${RUNNER_TEMP}/gradle-build.log" | tail -n 20 | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Gradle assembleDebug failed::${summary:-Gradle failed; see Build Debug APK logs}"
            tail -n 160 "${RUNNER_TEMP}/gradle-build.log"
            exit "$status"
          fi

      - name: Summarize Gradle failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "${RUNNER_TEMP}/gradle-build.log" ]]; then
            echo "### Gradle failure summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "(^FAILURE:|^\* What went wrong:|^> |requires|Failed|Exception|error:|Caused by)" "${RUNNER_TEMP}/gradle-build.log" | tail -n 120 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 160 "${RUNNER_TEMP}/gradle-build.log"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/rokid/app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare Release Keystore
        if: ${{ env.ROKID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ANDROID_PROJECT_DIR}/.keystore"
          printf '%s' "$ROKID_KEYSTORE_BASE64" | base64 -d > "${ANDROID_PROJECT_DIR}/.keystore/release.jks"

      - name: Build Signed Release APK
        if: ${{ env.ROKID_KEYSTORE_BASE64 != '' }}
        shell: bash
        env:
          ROKID_KEYSTORE_PATH: .keystore/release.jks
          ROKID_KEYSTORE_PASSWORD: ${{ env.ROKID_KEYSTORE_PASSWORD }}
          ROKID_KEY_ALIAS: ${{ env.ROKID_KEY_ALIAS }}
          ROKID_KEY_PASSWORD: ${{ env.ROKID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          gradle -p "${ANDROID_PROJECT_DIR}" :app:assembleRelease

      - name: Upload Release APK
        if: ${{ env.ROKID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/rokid/app/build/outputs/apk/release/app-release.apk
